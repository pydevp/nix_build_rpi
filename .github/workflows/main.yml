name: Build Flake (Native ARM64) and Push to Cachix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up Cachix
        uses: cachix/cache-action@v17
        with:
          name: pydevrpi
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'

      - name: Build Nix Flake Package
        run: |
          nix build .#packages.aarch64-linux.default --print-build-logs
